<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickups</title>

  <script>document.documentElement.classList.add("preload");</script>
  <style>
    html.preload, html.preload body { background: #0b0b0c; }
    html.preload #content { visibility: hidden; }
    html.preload #app-header { visibility: visible; }
    html.preload #clubLoadingOverlay { display: flex !important; visibility: visible !important; opacity: 1 !important; pointer-events: auto !important; }
  </style>
  <script src="/js/ui/loader.preload.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="loading">
  <div id="content">
    <div id="app-header"></div>

    <main class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-end mb-4 gap-3">
        <div>
          <h1 class="page-title mb-1">Pickups</h1>
          <div class="text-muted" id="pageSubtitle">Juegos abiertos del club</div>
        </div>

        <div class="d-flex align-items-center gap-2">
          <span class="badge d-none" id="roleBadge">VIEW</span>
          <button class="btn btn-primary btn-sm d-none" id="openCreatePickupBtn" type="button">
            + Crear pickup
          </button>
        </div>
      </div>

      <div class="alert d-none" id="alertBox" role="alert"></div>

      <div class="card shadow-sm mb-3">
        <div class="card-body py-3">
          <ul class="nav nav-pills gap-2" id="pickupTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="tabUpcomingBtn" data-bs-toggle="pill" data-bs-target="#tabUpcoming" type="button" role="tab">
                Próximos
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tabMineBtn" data-bs-toggle="pill" data-bs-target="#tabMine" type="button" role="tab">
                Mis Pickups
              </button>
            </li>
            <li class="nav-item d-none" role="presentation" id="adminTabWrap">
              <button class="nav-link" id="tabAdminBtn" data-bs-toggle="pill" data-bs-target="#tabAdmin" type="button" role="tab">
                Admin Pickups
              </button>
            </li>
          </ul>
        </div>
      </div>

      <div class="tab-content">
        <section class="tab-pane fade show active" id="tabUpcoming" role="tabpanel">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
            <div class="input-group" style="max-width: 520px;">
              <span class="input-group-text">🔎</span>
              <input class="form-control" id="pickupSearch" placeholder="Buscar pickups…" />
            </div>
            <button class="btn btn-outline-secondary btn-sm" id="refreshPickupsBtn">Refrescar</button>
          </div>

          <div class="row g-3" id="upcomingPickupsList"></div>
          <div class="text-muted small mt-3 d-none" id="upcomingPickupsEmpty">No hay pickups próximos.</div>
        </section>

        <section class="tab-pane fade" id="tabMine" role="tabpanel">
          <div class="list-group" id="myRegistrationsList"></div>
          <div class="text-muted small mt-3 d-none" id="myRegistrationsEmpty">No tenés pickups inscritos todavía.</div>
        </section>

        <section class="tab-pane fade" id="tabAdmin" role="tabpanel">
          <div class="list-group" id="adminPickupsList"></div>
          <div class="text-muted small mt-3 d-none" id="adminPickupsEmpty">No hay pickups creados todavía.</div>
        </section>
      </div>
    </main>
  </div>

  <div id="modalMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/features/pickups/pickups.js"></script>
  <script src="/js/layout.js" defer></script>
</body>
</html>
