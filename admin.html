<!DOCTYPE html>
<html lang="es" class="preload">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Volcanes Ultimate</title>

  <script>document.documentElement.classList.add("preload");</script>
  <script src="/js/ui/loader.preload.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="loading">

  <div id="app-header"></div>

  <main class="container py-4 admin-page">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
      <div>
        <h1 class="h3 mb-1">Administración</h1>
        <p class="text-muted mb-0">Aprobación de usuarios y vínculo con jugadores.</p>
      </div>
    </div>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <div>
            <h2 class="h5 mb-1">Cuentas pendientes</h2>
            <p class="text-muted mb-0">Usuarios con onboarding completo pero aún sin activar.</p>
          </div>
          <button id="refreshPendingBtn" class="btn btn-outline-primary btn-sm" type="button">
            <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
          </button>
        </div>

        <div class="table-responsive">
          <table class="table align-middle" id="pendingUsersTable">
            <thead>
              <tr>
                <th>Email</th>
                <th>Nombre</th>
                <th>Associate</th>
                <th>Player ligado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="5" class="text-muted">Cargando…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Jugadores existentes</h2>
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <input id="playerSearchInput" class="form-control" type="search" placeholder="Buscar jugador por nombre o email">
          </div>
          <div class="col-md-3">
            <select id="playerRoleFilter" class="form-select">
              <option value="">Todos los perfiles</option>
            </select>
          </div>
          <div class="col-md-3">
            <button id="refreshPlayersBtn" class="btn btn-outline-secondary w-100" type="button">
              <i class="bi bi-arrow-clockwise me-1"></i>Actualizar lista
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table align-middle" id="playersTable">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Perfil</th>
                <th>Associate</th>
                <th>UID</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="5" class="text-muted">Cargando…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="approveUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <form id="approveUserForm">
          <div class="modal-header">
            <h5 class="modal-title">Aprobar usuario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="approveUid">
            <input type="hidden" id="approveAssociateId">

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input id="approveEmail" class="form-control" type="text" readonly>
            </div>

            <div class="mb-3">
              <label class="form-label">Rol del sistema</label>
              <select id="approveSystemRole" class="form-select"></select>
            </div>

            <div class="mb-3">
              <label class="form-label">Modo de vínculo</label>
              <select id="approveLinkMode" class="form-select">
                <option value="existing">Ligar a jugador existente</option>
                <option value="new">Crear jugador nuevo</option>
                <option value="none">Activar sin jugador</option>
              </select>
            </div>

            <div id="existingPlayerWrap" class="mb-3">
              <label class="form-label">Jugador existente</label>
              <select id="approveExistingPlayerId" class="form-select">
                <option value="">Seleccionar…</option>
              </select>
            </div>

            <div id="newPlayerWrap" class="border rounded p-3 d-none">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nombre</label>
                  <input id="newPlayerFirstName" class="form-control" type="text">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Apellido</label>
                  <input id="newPlayerLastName" class="form-control" type="text">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Fecha de nacimiento</label>
                  <input id="newPlayerBirthday" class="form-control" type="date">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Perfil en cancha</label>
                  <select id="newPlayerFieldRole" class="form-select"></select>
                </div>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
            <button id="approveSubmitBtn" class="btn btn-primary" type="submit">Aprobar cuenta</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
