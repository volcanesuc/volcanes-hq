<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Entrenamientos</title>

    <script>document.documentElement.classList.add("preload");</script>
    <style>
      html.preload, html.preload body { background: #0b0b0c; }
      html.preload body { visibility: hidden; }
      html.preload #clubLoadingOverlay { visibility: visible; }
    </style>
    <script src="/js/ui/loader.preload.js?v=20260226-3"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/trainings.css" />
  </head>

  <body class="loading">
    <div id="app-header"></div>

    <main class="container py-4 trainings-page">

      <div class="trainings-page-head mb-4">
        <div>
          <h1 class="page-title mb-1">Historial de Entrenamientos</h1>
          <small class="text-muted">
            Bitácora de sesiones realizadas y control de asistencia del equipo.
          </small>
        </div>

        <button
          id="addTrainingBtn"
          class="btn btn-primary training-add-btn"
          type="button"
        >
          <i class="bi bi-plus-lg"></i>
          <span class="label-desktop">Registrar entrenamiento</span>
          <span class="label-mobile">Registrar</span>
        </button>
      </div>

      <section class="mb-3">
        <div class="row g-3">
          <div class="col-12 col-md-4">
            <div class="kpi-card h-100">
              <div class="card-body">
                <div class="kpi-value" id="kpiTotalTrainings">—</div>
                <div class="kpi-label">Total entrenamientos realizados</div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="kpi-card h-100">
              <div class="card-body">
                <div class="kpi-value" id="kpiAvgAttendance">—</div>
                <div class="kpi-label">Asistencia promedio</div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="kpi-card h-100">
              <div class="card-body">
                <div class="kpi-value" id="kpiLastTraining">—</div>
                <div class="kpi-label">Último entrenamiento</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="mb-3">
        <div class="card filters-card training-filters-panel">
          <button
            id="trainingFiltersToggle"
            class="training-filters-toggle"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#trainingFiltersCollapse"
            aria-expanded="false"
            aria-controls="trainingFiltersCollapse"
          >
            <span class="d-inline-flex align-items-center gap-2">
              <i class="bi bi-funnel"></i>
              Buscar y filtrar
            </span>
            <i class="bi bi-chevron-down training-filters-chevron"></i>
          </button>

          <div class="collapse" id="trainingFiltersCollapse">
            <div class="card-body training-filters-body">
              <div class="row g-2 align-items-end">

                <div class="col-12 col-lg-3">
                  <label class="form-label small text-muted mb-1">Buscar por contenido</label>
                  <div class="input-group">
                    <span class="input-group-text" aria-hidden="true">🔎</span>
                    <input
                      id="trainingSearch"
                      class="form-control"
                      placeholder="Buscar en sesión / drills / notas…"
                    />
                  </div>
                </div>

                <div class="col-6 col-md-3 col-lg-2">
                  <label class="form-label small text-muted mb-1">Mes</label>
                  <select id="monthFilter" class="form-select">
                    <option value="">Todos</option>
                  </select>
                </div>

                <div class="col-6 col-md-3 col-lg-2">
                  <label class="form-label small text-muted mb-1">Ordenar</label>
                  <select id="sortFilter" class="form-select">
                    <option value="date_desc">Fecha (reciente → antiguo)</option>
                    <option value="date_asc">Fecha (antiguo → reciente)</option>
                    <option value="att_desc">Asistentes (mayor → menor)</option>
                    <option value="att_asc">Asistentes (menor → mayor)</option>
                  </select>
                </div>

                <div class="col-6 col-md-4 col-lg-2">
                  <label class="form-label small text-muted mb-1">Desde</label>
                  <input id="dateFrom" type="date" class="form-control" />
                </div>

                <div class="col-6 col-md-3 col-lg-2">
                  <label class="form-label small text-muted mb-1">Hasta</label>
                  <input id="dateTo" type="date" class="form-control" />
                </div>

                <div class="col-12 col-lg-1 d-flex">
                  <button
                    id="clearFiltersBtn"
                    class="btn btn-outline-secondary w-100 clear-filters-btn"
                    type="button"
                  >
                    <span class="clear-desktop">✕</span>
                    <span class="clear-mobile">
                      <i class="bi bi-x-lg"></i> Limpiar
                    </span>
                  </button>
                </div>

              </div>
            </div>
          </div>
        </div>
      </section>

      <div id="trainingsCards" class="d-md-none mb-2"></div>

      <div class="card d-none d-md-block">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 trainings-table">
              <thead class="text-uppercase small">
                <tr>
                  <th>Fecha</th>
                  <th>Sesión realizada</th>
                  <th>Asistentes</th>
                </tr>
              </thead>
              <tbody id="trainingsTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <span id="appVersion" class="text-muted small d-block mt-3"></span>
    </main>

    <!-- partial mount -->
    <div id="trainingModalMount"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/trainings.js"></script>
    <script src="/js/layout.js" defer></script>
  </body>
</html>
