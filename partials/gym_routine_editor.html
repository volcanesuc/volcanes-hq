<div class="modal fade" id="gymRoutineModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content app-modal">

      <form class="h-100 d-flex flex-column">
        <div class="modal-header app-modal__header">
          <div>
            <h5 class="modal-title mb-0" id="gymRoutineModalTitle">Rutina</h5>
            <div class="small app-modal__subtitle">Armá la rutina y ordená sus ejercicios.</div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body app-modal__body">
          <div class="alert d-none" id="gymRoutineAlert"></div>

          <div class="row g-3">
            <div class="col-12 col-xl-4">
              <div class="card app-form-card h-100">
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" id="grName" placeholder="Rutina Lunes PM - Pierna" />
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input class="form-control" id="grDescription" placeholder="Fuerza base + accesorios" />
                  </div>

                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="grIsPublic" checked>
                    <label class="form-check-label" for="grIsPublic">Pública</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-xl-8">
              <div class="card app-form-card">
                <div class="card-body">
                  <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
                    <div class="fw-semibold">Ejercicios de la rutina</div>

                    <div class="d-flex gap-2 flex-wrap align-items-end">
                      <div style="min-width:260px;">
                        <label class="form-label small text-muted mb-1">Agregar ejercicio</label>
                        <select class="form-select" id="grAddExerciseSelect"></select>
                      </div>
                      <button class="btn btn-outline-primary btn-sm" id="grAddExerciseBtn" type="button">+ Agregar</button>
                    </div>
                  </div>

                  <div class="table-responsive">
                    <table class="table table-sm align-middle">
                      <thead class="table-light">
                        <tr>
                          <th style="width:40px;">#</th>
                          <th>Ejercicio</th>
                          <th style="width:90px;">Sets</th>
                          <th style="width:90px;">Reps</th>
                          <th style="width:120px;">Dist</th>
                          <th style="width:100px;">Desc (s)</th>
                          <th>Notas</th>
                          <th style="width:120px;"></th>
                        </tr>
                      </thead>
                      <tbody id="grItemsTbody"></tbody>
                    </table>
                  </div>

                  <div class="text-muted small">
                    Tip: Reps o Distancia (uno u otro). Si el ejercicio es por distancia, usa “Dist”.
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer app-modal__footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
          <button class="btn btn-primary" id="saveGymRoutineBtn" type="button">Guardar rutina</button>
        </div>
      </form>

    </div>
  </div>
</div>
