<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
  background:transparent;
  padding:16px;
}

.member-card{
  border:1px solid #e5e7eb;
  border-radius:8px;
}

.member-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.member-header h5{
  margin:0;
  font-weight:600;
}

.member-subtitle{
  font-size:13px;
  color:#6c757d;
}

.card-footer{
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

.nav-tabs .nav-link{
  font-size:14px;
}
</style>

</head>

<body>

<div class="card member-card shadow-sm">

  <!-- HEADER -->
  <div class="card-body border-bottom">

    <div class="member-header mb-1">

      <div>
        <h5 id="modalTitle">Editar miembro</h5>
        <div class="member-subtitle">
          Completá la información general del miembro de la asociación
        </div>
      </div>

      <button id="btnClose" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-x-lg"></i>
      </button>

    </div>

  </div>


  <!-- BODY -->
  <div class="card-body">

    <input type="hidden" id="associateId"/>

    <!-- TABS -->
    <ul class="nav nav-tabs mb-3">

      <li class="nav-item">
        <button class="nav-link active"
          data-bs-toggle="tab"
          data-bs-target="#memberTabGeneral"
          type="button">
          General
        </button>
      </li>

      <li class="nav-item">
        <button class="nav-link"
          data-bs-toggle="tab"
          data-bs-target="#memberTabNotas"
          type="button">
          Notas
        </button>
      </li>

    </ul>


    <div class="tab-content">

      <!-- GENERAL -->
      <div class="tab-pane fade show active" id="memberTabGeneral">

        <div class="row g-3">

          <div class="col-md-8">
            <label class="form-label">Nombre completo</label>
            <input id="fullName" class="form-control" placeholder="Nombre completo">
          </div>

          <div class="col-md-2">
            <label class="form-label">Tipo</label>
            <select id="type" class="form-select">
              <option value="player">Jugador/a</option>
              <option value="supporter">Supporter</option>
              <option value="parent">Encargado/a</option>
              <option value="other">Otro</option>
            </select>
          </div>

          <div class="col-md-2">
            <label class="form-label">Activo</label>
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" id="active">
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input id="email" class="form-control" placeholder="correo@dominio.com">
          </div>

          <div class="col-md-6">
            <label class="form-label">Teléfono</label>
            <input id="phone" class="form-control" placeholder="+506 ...">
          </div>

          <div class="col-md-6">
            <label class="form-label">Cédula / ID</label>
            <input id="idNumber" class="form-control" placeholder="1-2345-6789">
          </div>

        </div>

      </div>


      <!-- NOTAS -->
      <div class="tab-pane fade" id="memberTabNotas">

        <label class="form-label">Notas</label>

        <textarea
          id="notes"
          class="form-control"
          rows="6"
          placeholder="Observaciones..."
        ></textarea>

      </div>

    </div>

  </div>


  <!-- FOOTER -->
  <div class="card-footer">

    <button id="btnCancel" class="btn btn-outline-secondary">
      Cancelar
    </button>

    <button id="btnSave" class="btn btn-primary">
      <i class="bi bi-save me-1"></i>
      Guardar miembro
    </button>

  </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/features/association/assoc_member_modal.js"></script>

</body>
</html>
