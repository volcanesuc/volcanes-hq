<div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content player-modal">

      <form id="playerForm" class="h-100 d-flex flex-column">
        <input type="hidden" id="playerId" />

        <div class="modal-header player-modal__header">
          <div>
            <h5 class="modal-title mb-0 text-white" id="playerModalTitle">Jugador</h5>
            <small class="player-modal__subtitle text-white" id="playerModalSubtitle">
              Nuevo / Editar
            </small>
          </div>

          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Cerrar"
          ></button>
        </div>

        <div class="modal-body player-modal__body flex-grow-1">
          <div class="row g-3">

            <div class="col-12 col-md-6">
              <label class="form-label" for="firstName">Nombre</label>
              <input type="text" id="firstName" class="form-control" required />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="lastName">Apellido</label>
              <input type="text" id="lastName" class="form-control" required />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="idNumber">Documento de identidad</label>
              <input type="text" id="idNumber" class="form-control" placeholder="Ej: 1-2345-6789" />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label" for="gender">Género</label>
              <select id="gender" class="form-select">
                <option value="">—</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="X">Otro</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label" for="birthday">Nacimiento</label>
              <input type="date" id="birthday" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label" for="number">Número de camisa</label>
              <input type="number" id="number" class="form-control" />
            </div>

            <div class="col-12">
              <label class="form-label" for="role">Rol</label>
              <select id="role" class="form-select">
                <option value="handler">Handler</option>
                <option value="cutter">Cutter</option>
                <option value="hybrid">Hybrid</option>
              </select>
            </div>

            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="active" checked />
                <label class="form-check-label" for="active">Jugador activo</label>
              </div>
            </div>

          </div>
        </div>

        <div class="modal-footer player-modal__footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" id="playerSaveBtn">
            Guardar
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
