<div class="modal fade" id="communityPostModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content app-modal">

      <form id="communityPostForm" class="h-100 d-flex flex-column">
        <input type="hidden" id="communityPostId" />

        <div class="modal-header app-modal__header">
          <div>
            <h5 class="modal-title mb-0" id="communityModalTitle">Nuevo post</h5>
            <small class="app-modal__subtitle" id="communityModalSubtitle">
              Compartí ideas, sesiones grabadas y recursos del club
            </small>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Cerrar"
          ></button>
        </div>

        <div class="modal-body app-modal__body">
          <div class="card app-form-card">
            <div class="card-body">
              <div class="row g-3">

                <div class="col-12 col-md-8">
                  <label class="form-label" for="postTitle">Título</label>
                  <input id="postTitle" class="form-control" maxlength="120" required />
                </div>

                <div class="col-12 col-md-4">
                  <label class="form-label" for="postType">Tipo</label>
                  <select id="postType" class="form-select" required>
                    <option value="opinion">Opinión</option>
                    <option value="video">Video</option>
                    <option value="session">Sesión</option>
                    <option value="media">Media</option>
                    <option value="document">Documento</option>
                    <option value="announcement">Anuncio</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label" for="postSummary">Resumen corto</label>
                  <input
                    id="postSummary"
                    class="form-control"
                    maxlength="180"
                    placeholder="Una línea corta para preview del card"
                  />
                </div>

                <div class="col-12">
                  <label class="form-label" for="postBody">Contenido</label>
                  <textarea
                    id="postBody"
                    class="form-control"
                    rows="6"
                    placeholder="Escribí la opinión, resumen o descripción del recurso"
                  ></textarea>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postExternalUrl">Link externo</label>
                  <input
                    id="postExternalUrl"
                    type="url"
                    class="form-control"
                    placeholder="https://..."
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postYouTubeUrl">Link de YouTube</label>
                  <input
                    id="postYouTubeUrl"
                    type="url"
                    class="form-control"
                    placeholder="https://www.youtube.com/watch?v=..."
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postMediaType">Tipo de media</label>
                  <select id="postMediaType" class="form-select">
                    <option value="">Ninguno</option>
                    <option value="image">Imagen</option>
                    <option value="pdf">PDF</option>
                    <option value="link">Link</option>
                    <option value="other">Otro</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postMediaUrl">URL del media</label>
                  <input
                    id="postMediaUrl"
                    type="url"
                    class="form-control"
                    placeholder="https://..."
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postTags">Tags</label>
                  <input
                    id="postTags"
                    class="form-control"
                    placeholder="estrategia, torneo, offense, defensa"
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label" for="postVisibility">Visibilidad</label>
                  <select id="postVisibility" class="form-select">
                    <option value="club">Club</option>
                    <option value="staff">Solo staff</option>
                  </select>
                </div>

                <div class="col-12">
                  <div class="form-check form-switch">
                    <input id="postPinned" class="form-check-input" type="checkbox" />
                    <label for="postPinned" class="form-check-label">
                      Marcar como destacado
                    </label>
                  </div>
                </div>

                <div class="col-12">
                  <div class="community-form-help">
                    <i class="bi bi-info-circle"></i>
                    Si pegás un link de YouTube válido, el video se mostrará embebido en el card.
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer app-modal__footer">
          <div class="app-modal__footer-right d-flex gap-2 ms-auto">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button id="savePostBtn" type="submit" class="btn btn-primary">
              <i class="bi bi-save"></i>
              Guardar post
            </button>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
