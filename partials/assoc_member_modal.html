<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar miembro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/association.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f7f8fa;
      overflow: hidden;
    }

    .assoc-member-modal {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f7f8fa;
    }

    .assoc-member-modal__content {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .assoc-member-modal__body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 1.25rem;
      background: #f7f8fa;
    }

    .assoc-member-modal__footer {
      flex: 0 0 auto;
    }

    .assoc-member-modal .nav-tabs {
      margin-bottom: 1rem;
    }

    .assoc-member-modal .tab-content {
      min-height: 260px;
    }

    .assoc-member-modal__header {
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .assoc-member-modal__close {
      flex: 0 0 auto;
      margin-top: 0.15rem;
      margin-left: auto;
    }
  </style>
</head>

<body>
  <form id="memberForm" class="assoc-member-modal">
    <input type="hidden" id="associateId" />

    <div class="modal-header app-modal__header assoc-member-modal__header">
      <div class="pe-3">
        <h5 class="modal-title mb-0" id="modalTitle">Editar miembro</h5>
        <small class="app-modal__subtitle">
          Completá la información general del miembro de la asociación
        </small>
      </div>

      <button
        id="btnClose"
        type="button"
        class="btn-close btn-close-white assoc-member-modal__close"
        aria-label="Cerrar"
      ></button>
    </div>

    <div class="assoc-member-modal__content">
      <div class="assoc-member-modal__body">
        <div class="card app-form-card">
          <div class="card-body">
            <ul class="nav nav-tabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link active"
                  data-bs-toggle="tab"
                  data-bs-target="#memberTabGeneral"
                  type="button"
                  role="tab"
                >
                  General
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link"
                  data-bs-toggle="tab"
                  data-bs-target="#memberTabNotas"
                  type="button"
                  role="tab"
                >
                  Notas
                </button>
              </li>
            </ul>

            <div class="tab-content">
              <div class="tab-pane fade show active" id="memberTabGeneral" role="tabpanel">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="firstName">Nombre</label>
                    <input
                      id="firstName"
                      class="form-control"
                      placeholder="Nombre"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="lastName">Apellido</label>
                    <input
                      id="lastName"
                      class="form-control"
                      placeholder="Apellido"
                    />
                  </div>

                  <div class="col-12 col-md-3">
                    <label class="form-label" for="type">Tipo</label>
                    <select id="type" class="form-select">
                      <option value="player">Jugador/a</option>
                      <option value="supporter">Supporter</option>
                      <option value="parent">Encargado/a</option>
                      <option value="other">Otro</option>
                    </select>
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input
                      id="email"
                      type="email"
                      class="form-control"
                      placeholder="correo@dominio.com"
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="phone">Teléfono</label>
                    <input
                      id="phone"
                      class="form-control"
                      placeholder="+506 ..."
                    />
                  </div>

                  <div class="col-12 col-md-6">
                    <label class="form-label" for="idNumber">Cédula / ID</label>
                    <input
                      id="idNumber"
                      class="form-control"
                      placeholder="1-2345-6789"
                    />
                  </div>
                </div>
              </div>

              <div class="tab-pane fade" id="memberTabNotas" role="tabpanel">
                <label class="form-label" for="notes">Notas</label>
                <textarea
                  id="notes"
                  class="form-control"
                  rows="8"
                  placeholder="Observaciones..."
                ></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer app-modal__footer assoc-member-modal__footer">
        <div class="app-modal__footer-right d-flex gap-2 ms-auto">
          <button id="btnCancel" type="button" class="btn btn-outline-secondary">
            Cancelar
          </button>
          <button id="btnSave" type="button" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>
            Guardar miembro
          </button>
        </div>
      </div>
    </div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/features/association/assoc_member_modal.js"></script>
</body>
</html>
