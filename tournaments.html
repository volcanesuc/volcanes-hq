<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="pageTitle">—</title>
  
  <script>document.documentElement.classList.add("preload");</script>
  <style>
    html.preload, html.preload body { background: #0b0b0c; }
    html.preload body { visibility: hidden; }
    html.preload #clubLoadingOverlay { visibility: visible; }
  </style>
  <script src="/js/ui/loader.preload.js"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/main.css" />

  <style>
    .tournaments-toolbar{
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.875rem;
      align-items: end;
    }

    .tournaments-search-wrap{
      min-width: 0;
    }

    .tournaments-actions{
      display: flex;
      justify-content: stretch;
    }

    .tournaments-actions .btn{
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      white-space: nowrap;
    }

    .tournaments-search-wrap .form-control{
      min-height: 46px;
    }

    .tournament-section{
      margin-top: 1.5rem;
    }

    .tournament-section:first-of-type{
      margin-top: 0;
    }

    .tournament-section__header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .75rem;
    }

    .tournament-section__title{
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }

    .tournament-section__count{
      font-size: .8rem;
      color: var(--text-soft, #6b7280);
      white-space: nowrap;
    }

    .tournament-empty{
      padding: 1rem;
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 14px;
      color: var(--text-soft, #6b7280);
      background: rgba(255,255,255,.02);
    }

    @media (min-width: 768px){
      .tournaments-toolbar{
        grid-template-columns: minmax(280px, 360px) auto;
        justify-content: end;
      }

      .tournaments-actions{
        justify-content: flex-end;
      }

      .tournaments-actions .btn{
        width: auto;
        min-width: 180px;
      }
    }
  </style>
</head>

<body class="loading">
  <div id="app-header"></div>

  <main id="content" class="container py-4 tournaments-page">

    <!-- TÍTULO -->
    <div class="tournaments-page-head mb-3">
      <div>
        <h1 class="page-title mb-1" id="pageHeading">—</h1>
        <small class="text-muted" id="pageSubtitle">—</small>
      </div>
    </div>

    <!-- TOOLBAR STICKY -->
    <div class="tournaments-toolbar-sticky mb-4">
      <div class="tournaments-toolbar card-soft p-3">
        <div class="tournaments-search-wrap">
          <label
            class="form-label small text-muted mb-1"
            id="searchLabel"
          >—</label>

          <input
            id="tournamentSearch"
            class="form-control"
            placeholder=""
          />
        </div>

        <div class="tournaments-actions">
          <button
            id="addTournamentBtn"
            class="btn btn-primary tournament-add-btn"
            type="button"
          >
            <i class="bi bi-plus-lg"></i>
            <span>—</span>
          </button>
        </div>
      </div>
    </div>

    <!-- LISTA MOBILE -->
    <div id="tournamentsCards" class="d-md-none"></div>

    <!-- LISTA DESKTOP -->
    <div id="tournamentsDesktop" class="d-none d-md-block"></div>

    <div class="mt-3">
      <span id="appVersion" class="text-muted small"></span>
    </div>
  </main>

  <div id="modalMount"></div>
  
  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/tournaments.js"></script>
  <script src="/js/layout.js" defer></script>
</body>
</html>
