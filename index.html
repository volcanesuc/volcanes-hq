<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volcanes Ultimate</title>

  <script>document.documentElement.classList.add("preload");</script>
  <script src="/js/ui/loader.preload.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- CSS del landing -->
  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./css/main.css" />  <!-- CSS del header -->
</head>
<body>

  <!-- ======================================================
       HEADER
  ======================================================= -->
  <div id="app-header"></div>

   <!-- ======================================================
       INACTIVE USER MSG
  ======================================================= -->
  <section id="pendingApprovalSection" class="landing-section d-none">
  <div class="landing-card pending-approval-card">
    <div class="d-flex align-items-center gap-2 mb-2">
      <i class="bi bi-hourglass-split fs-4"></i>
      <h2 class="mb-0">Cuenta en validación</h2>
    </div>

    <p class="mb-3">
      Ya completaste tu registro, pero un administrador todavía debe activar tu cuenta
      antes de darte acceso al dashboard.
    </p>

    <div class="d-flex gap-2 flex-wrap">
      <button id="pendingRetryBtn" class="landing-btn" type="button">
        Reintentar
      </button>
      <button id="pendingLogoutBtn" class="landing-btn landing-btn-whatsapp" type="button">
        Cerrar sesión
      </button>
    </div>
  </div>
</section>

  <!-- ======================================================
       HERO
  ======================================================= -->
  <section class="landing-section hero">
    <div>
      <h2>—</h2>
      <p>—</p>
      <div id="heroSocialsWrap" class="hero-socials-wrap" style="display:none;">
        <div class="hero-socials-label">Seguinos en</div>
        <div id="heroSocials" class="hero-socials"></div>
      </div>
    </div>
    <div>
      <img class="hero-img" alt="Hero image" />
    </div>
  </section>
  <!-- ======================================================
       TRAININGS
  ======================================================= -->
  <section id="entrenamientos" class="landing-section">
    <h2>—</h2>
    <div class="landing-cards">

      <div class="landing-card">
        <h3>—</h3>
      </div>

      <div class="landing-card">
        <h3>—</h3>
      </div>

    </div>
    <div class="trainings-cta">
      <a class="landing-btn" id="trainingsWhatsappCta" target="_blank">
        —
      </a>
    </div>
  </section>

   <!-- ======================================================
       EVENTS / TORNEOS
  ======================================================= -->
  <section class="landing-section" id="eventsSection">
    <h2>—</h2>
    <p>—</p>
    <div class="events"></div>
  </section>


  <!-- ======================================================
       HONORS / PALMARÉS
  ======================================================= -->
  <section class="landing-section" id="honorsSection">
    <h2>—</h2>
    <div class="landing-cards"></div>
  </section>

  <!-- ======================================================
       UNIFORMS (BOOTSTRAP CAROUSEL)
  ======================================================= -->
  <section class="landing-section" id="uniformsSection">
    <h2>—</h2>
    <p>—</p>

    <div
      id="uniformsCarousel"
      class="carousel slide"
      data-bs-ride="carousel"
      data-bs-interval="5000"
    >

      <div class="carousel-inner">
        <!-- index.js inyecta aquí los uniformes -->
      </div>

      <!-- Controls -->
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#uniformsCarousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#uniformsCarousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>
  </section>

  <!-- ======================================================
       FOOTER
  ======================================================= -->
  <footer class="landing-footer"></footer>


  <!-- ======================================================
       SCRIPTS
  ======================================================= -->

  <!-- Bootstrap JS (OBLIGATORIO para carousel) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- App -->
  <script type="module" src="/js/index.js"></script>

</body>

</html>
