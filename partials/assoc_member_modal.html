<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar miembro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f6f8fb;
    }

    body {
      overflow: hidden;
    }

    .member-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f6f8fb;
    }

    .member-header {
      flex: 0 0 auto;
      background: #155b52;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .member-header__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }

    .member-header__subtitle {
      margin: 4px 0 0;
      color: rgba(255,255,255,.85);
      font-size: .95rem;
    }

    .member-close {
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 1.75rem;
      line-height: 1;
      opacity: .85;
    }

    .member-close:hover {
      opacity: 1;
    }

    .member-body {
      flex: 1 1 auto;
      overflow: auto;
      padding: 20px;
    }

    .member-card {
      border: 1px solid #e6ebf2;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .member-card__inner {
      padding: 20px;
    }

    .member-footer {
      flex: 0 0 auto;
      background: #fff;
      border-top: 1px solid #e6ebf2;
      padding: 14px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .nav-tabs {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="member-page">
    <div class="member-header">
      <div>
        <h1 id="modalTitle" class="member-header__title">Editar miembro</h1>
        <p class="member-header__subtitle">
          Completá la información general del miembro de la asociación
        </p>
      </div>

      <button id="btnClose" class="member-close" type="button" aria-label="Cerrar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="member-body">
      <div class="member-card">
        <div class="member-card__inner">
          <input type="hidden" id="associateId"/>

          <ul class="nav nav-tabs">
            <li class="nav-item">
              <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#memberTabGeneral" type="button">
                General
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#memberTabNotas" type="button">
                Notas
              </button>
            </li>
          </ul>

          <div class="tab-content">
            <div class="tab-pane fade show active" id="memberTabGeneral">
              <div class="row g-3">
                <div class="col-12 col-lg-8">
                  <label class="form-label">Nombre completo</label>
                  <input id="fullName" class="form-control" placeholder="Nombre completo" />
                </div>

                <div class="col-12 col-md-6 col-lg-2">
                  <label class="form-label">Tipo</label>
                  <select id="type" class="form-select">
                    <option value="player">Jugador/a</option>
                    <option value="supporter">Supporter</option>
                    <option value="parent">Encargado/a</option>
                    <option value="other">Otro</option>
                  </select>
                </div>

                <div class="col-12 col-md-6 col-lg-2">
                  <label class="form-label">Activo</label>
                  <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="active">
                  </div>
                </div>

                <div class="col-12 col-lg-6">
                  <label class="form-label">Email</label>
                  <input id="email" class="form-control" placeholder="correo@dominio.com" />
                </div>

                <div class="col-12 col-lg-6">
                  <label class="form-label">Teléfono</label>
                  <input id="phone" class="form-control" placeholder="+506 ..." />
                </div>

                <div class="col-12 col-lg-6">
                  <label class="form-label">Cédula / ID</label>
                  <input id="idNumber" class="form-control" placeholder="1-2345-6789" />
                </div>
              </div>
            </div>

            <div class="tab-pane fade" id="memberTabNotas">
              <label class="form-label">Notas</label>
              <textarea id="notes" class="form-control" rows="8" placeholder="Observaciones..."></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="member-footer">
      <button id="btnCancel" class="btn btn-outline-secondary" type="button">
        Cancelar
      </button>

      <button id="btnSave" class="btn btn-success" type="button">
        <i class="bi bi-check2-square me-1"></i>
        Guardar miembro
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/features/association/assoc_member_modal.js"></script>
</body>
</html>
