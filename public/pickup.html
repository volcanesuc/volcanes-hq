<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickup</title>

  <script>document.documentElement.classList.add("preload");</script>
  <style>
    html.preload, html.preload body { background: #0b0b0c; }
    html.preload body { visibility: hidden; }
    html.preload #clubLoadingOverlay { visibility: visible; }
  </style>
  <script src="/js/ui/loader.preload.js"></script>

  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div id="app-header"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
      <div>
        <h1 class="page-title mb-1" id="pvTitle">—</h1>
        <div class="text-muted" id="pvSubtitle">Pickup</div>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-primary btn-sm" id="pvJoinBtn" type="button">Unirme</button>
        <button class="btn btn-outline-secondary btn-sm" id="pvShareBtn" type="button">Compartir</button>
      </div>
    </div>

    <div class="alert alert-danger d-none" id="pvError"></div>
    <div class="alert alert-info d-none" id="pvInfo"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <div class="small text-muted">Estado</div>
            <div class="fw-semibold" id="pvStatus">—</div>
          </div>
          <div class="col-12 col-md-6">
            <div class="small text-muted">Fecha y hora</div>
            <div class="fw-semibold" id="pvStartAt">—</div>
          </div>
          <div class="col-12 col-md-6">
            <div class="small text-muted">Ubicación</div>
            <div id="pvVenue">—</div>
          </div>
          <div class="col-12 col-md-6">
            <div class="small text-muted">Cupo</div>
            <div id="pvCapacity">—</div>
          </div>
          <div class="col-12">
            <div class="small text-muted">Notas / reglas</div>
            <div class="text-muted" id="pvNotes">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h2 class="h5 mb-3">Costos</h2>
        <div class="list-group" id="pvPricing"></div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Lista actual</h2>
        <div class="list-group" id="pvList"></div>
        <div class="text-muted small d-none" id="pvListEmpty">No hay personas registradas todavía.</div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/public/pickup_view.js"></script>
</body>
</html>
